name: Deploy til Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-api:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer avhengigheter (workspaces)
        run: npm ci

      - name: Generer Prisma-klient
        run: npx prisma generate
        working-directory: apps/api
        env:
          DATABASE_URL: "sqlserver://localhost:1433;database=ci;user=ci;password=ci;trustServerCertificate=true"

      - name: Bygg API
        run: npm run build
        working-directory: apps/api

      - name: Installer produksjonsavhengigheter i apps/api
        run: npm install --omit=dev
        working-directory: apps/api

      - name: Verifiser deploy-innhold
        run: |
          echo "=== dist/ ===" && ls apps/api/dist/
          echo "=== node_modules (antall pakker) ===" && ls apps/api/node_modules | wc -l
          echo "=== dist/index.js (første 5 linjer) ===" && head -5 apps/api/dist/index.js

      - name: Deploy API til Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: lns-dataportal-api
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_API }}
          package: apps/api

  deploy-portal:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer avhengigheter (workspaces)
        run: npm ci

      - name: Bygg Portal
        run: npm run build
        working-directory: apps/portal
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Deploy Portal til Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: lns-dataportal-portal
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_PORTAL }}
          package: apps/portal
