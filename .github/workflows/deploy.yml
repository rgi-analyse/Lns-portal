name: Deploy til Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer avhengigheter
        run: npm ci

      - name: Generer Prisma-klient
        run: npx prisma generate
        working-directory: apps/api

      - name: Bygg API
        run: |
          cd apps/api
          npm run build

      - name: Bygg Portal
        run: |
          cd apps/portal
          npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}

      - name: Deploy API til Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: lns-dataportal-api
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_API }}
          package: .
          startup-command: 'node apps/api/dist/index.js'

      - name: Deploy Portal til Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: lns-dataportal-portal
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_PORTAL }}
          package: .
