name: Deploy til Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-api:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer avhengigheter (workspaces)
        run: npm ci

      - name: Generer Prisma-klient
        run: npx prisma generate
        working-directory: apps/api
        env:
          DATABASE_URL: "sqlserver://localhost:1433;database=ci;user=ci;password=ci;trustServerCertificate=true"

      - name: Bygg API
        run: npm run build
        working-directory: apps/api

      - name: Pakk deploy-pakke (isolert fra workspace)
        run: |
          rm -rf /tmp/api-deploy
          mkdir /tmp/api-deploy
          cp -r apps/api/dist /tmp/api-deploy/
          cp apps/api/package.json /tmp/api-deploy/
          cd /tmp/api-deploy && npm install --omit=dev --no-package-lock

      - name: Verifiser deploy-pakke
        run: |
          echo "=== Innhold ===" && ls /tmp/api-deploy/
          echo "=== node_modules/fastify ===" && ls /tmp/api-deploy/node_modules/fastify 2>&1 | head -3
          echo "=== node_modules (antall) ===" && ls /tmp/api-deploy/node_modules | wc -l
          echo "=== dist/index.js (første 5 linjer) ===" && head -5 /tmp/api-deploy/dist/index.js

      - name: Deploy API til Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: lns-dataportal-api
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_API }}
          package: /tmp/api-deploy

  deploy-portal:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer avhengigheter (workspaces)
        run: npm ci

      - name: Bygg Portal
        run: npm run build
        working-directory: apps/portal
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
          NEXT_PUBLIC_AZURE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_AZURE_CLIENT_ID }}
          NEXT_PUBLIC_AZURE_TENANT_ID: ${{ secrets.NEXT_PUBLIC_AZURE_TENANT_ID }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Deploy Portal til Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: lns-dataportal-portal
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_PORTAL }}
          package: apps/portal
