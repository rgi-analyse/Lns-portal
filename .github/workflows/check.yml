name: Sjekker

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  auth-guardrail:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer avhengigheter (workspaces)
        run: npm ci

      - name: Auth-guardrail selv-test
        run: npm run check:auth:selftest

      - name: Auth-guardrail (skann repo)
        run: npm run check:auth
